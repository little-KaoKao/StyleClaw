<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ project_name }} — Batch T2I #{{ batch_num }}</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 1400px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
  h1 { border-bottom: 2px solid #333; padding-bottom: 8px; }
  .meta { background: #fff; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; }
  .progress { font-size: 1.1em; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .case-card { background: #fff; border-radius: 8px; padding: 12px; }
  .case-card h4 { margin: 0 0 4px; font-size: 0.85em; color: #666; }
  .case-card p { margin: 4px 0 8px; font-size: 0.9em; }
  .case-card img { width: 100%; height: auto; border-radius: 4px; margin-top: 4px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75em; }
  .badge.success { background: #d4edda; color: #155724; }
  .badge.pending { background: #e2e3e5; color: #383d41; }
  .badge.failed { background: #f8d7da; color: #721c24; }
</style>
</head>
<body>
<h1>{{ project_name }} — Batch T2I #{{ batch_num }}</h1>
<div class="meta">
  <p><strong>Trigger:</strong> {{ trigger_phrase }}</p>
  <p class="progress">Progress: {{ completed }}/{{ total }} completed</p>
</div>

<div class="grid">
  {% for c in cases %}
  <div class="case-card">
    <h4>{{ c.id }} <span class="badge {{ 'success' if c.status == 'SUCCESS' else ('failed' if c.status == 'FAILED' else 'pending') }}">{{ c.status }}</span></h4>
    <p><strong>{{ c.category }}</strong> ({{ c.aspect_ratio }}) — {{ c.description[:100] }}</p>
    {% for img in c.images %}
    <img src="{{ img }}" alt="{{ c.id }}">
    {% endfor %}
  </div>
  {% endfor %}
</div>
</body>
</html>
